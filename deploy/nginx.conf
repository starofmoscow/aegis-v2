# ============================================================
# EE AEGIS V2.0 — Nginx Configuration
# Reverse proxy for Next.js application with SSL termination
# ============================================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ────────────────────────────────────────────────────────
    # Logging Configuration
    # ────────────────────────────────────────────────────────

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    log_format detailed '$remote_addr - $remote_user [$time_local] '
                        '"$request" $status $body_bytes_sent '
                        '"$http_referer" "$http_user_agent" '
                        'rt=$request_time uct="$upstream_connect_time" '
                        'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # ────────────────────────────────────────────────────────
    # Performance Tuning
    # ────────────────────────────────────────────────────────

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    types_hash_bucket_size 64;
    client_max_body_size 20M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/rss+xml font/truetype font/opentype
               application/vnd.ms-fontobject image/svg+xml;
    gzip_disable "msie6";

    # ────────────────────────────────────────────────────────
    # Caching Configuration
    # ────────────────────────────────────────────────────────

    # Cache zone for static assets (30 days)
    proxy_cache_path /var/cache/nginx/static
        levels=1:2
        keys_zone=static:10m
        max_size=1g
        inactive=30d
        use_temp_path=off;

    # Cache zone for API responses (1 hour)
    proxy_cache_path /var/cache/nginx/api
        levels=1:2
        keys_zone=api:10m
        max_size=100m
        inactive=1h
        use_temp_path=off;

    # ────────────────────────────────────────────────────────
    # Upstream Configuration
    # ────────────────────────────────────────────────────────

    upstream aegis_backend {
        least_conn;
        server aegis:3000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # ────────────────────────────────────────────────────────
    # HTTP to HTTPS Redirect
    # ────────────────────────────────────────────────────────

    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # Let's Encrypt validation
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect all HTTP to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ────────────────────────────────────────────────────────
    # HTTPS Configuration
    # ────────────────────────────────────────────────────────

    server {
        listen 443 ssl http2 default_server;
        listen [::]:443 ssl http2 default_server;

        server_name _;

        # ────────────────────────────────────────────────────
        # SSL/TLS Configuration
        # ────────────────────────────────────────────────────

        ssl_certificate /etc/letsencrypt/live/localhost/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/localhost/privkey.pem;

        # SSL protocols and ciphers (Mozilla Intermediate)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:50m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # OCSP stapling (requires DNS resolution)
        # ssl_stapling on;
        # ssl_stapling_verify on;
        # resolver 8.8.8.8 8.8.4.4 valid=300s;
        # resolver_timeout 5s;

        # ────────────────────────────────────────────────────
        # Security Headers
        # ────────────────────────────────────────────────────

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" always;

        # Remove Nginx version
        server_tokens off;

        # ────────────────────────────────────────────────────
        # Health Check Endpoint
        # ────────────────────────────────────────────────────

        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # ────────────────────────────────────────────────────
        # Static Assets (with caching)
        # ────────────────────────────────────────────────────

        location ~* ^/_next/static/ {
            proxy_cache static;
            proxy_cache_valid 30d;
            proxy_cache_use_stale error timeout invalid_header updating;
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header X-Cache-Status $upstream_cache_status;
            proxy_pass http://aegis_backend;
            proxy_http_version 1.1;
        }

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_cache static;
            proxy_cache_valid 7d;
            proxy_cache_use_stale error timeout;
            add_header Cache-Control "public, max-age=604800";
            add_header X-Cache-Status $upstream_cache_status;
            proxy_pass http://aegis_backend;
            proxy_http_version 1.1;
            access_log off;
        }

        # ────────────────────────────────────────────────────
        # API Routes (no caching for dynamic content)
        # ────────────────────────────────────────────────────

        location ~ ^/api/ {
            proxy_pass http://aegis_backend;
            proxy_http_version 1.1;

            # WebSocket support
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";

            # Proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $server_name;
            proxy_set_header X-Forwarded-Port $server_port;

            # Timeouts for long-running requests (streaming)
            proxy_connect_timeout 600s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
            send_timeout 600s;

            # Buffering for streaming responses
            proxy_buffering off;
            proxy_request_buffering off;

            # Don't cache API responses in this location
            proxy_no_cache 1;
            proxy_cache_bypass 1;

            # Keep connections alive
            proxy_set_header Connection "";
            keepalive_timeout 600s;
        }

        # ────────────────────────────────────────────────────
        # Main Application (catch-all)
        # ────────────────────────────────────────────────────

        location / {
            proxy_pass http://aegis_backend;
            proxy_http_version 1.1;

            # WebSocket support
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $server_name;
            proxy_set_header X-Forwarded-Port $server_port;

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;

            # Buffering
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;

            # Error handling
            proxy_intercept_errors on;
            error_page 502 503 504 /50x.html;

            # Cache
            proxy_cache_bypass $http_upgrade $http_cache_control;
            proxy_no_cache $http_pragma $http_authorization;
        }

        # ────────────────────────────────────────────────────
        # Error Pages
        # ────────────────────────────────────────────────────

        error_page 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }

        # ────────────────────────────────────────────────────
        # Deny access to sensitive files
        # ────────────────────────────────────────────────────

        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        location ~ ~$ {
            deny all;
            access_log off;
            log_not_found off;
        }
    }

    # ────────────────────────────────────────────────────────
    # Server for monitoring (internal only)
    # ────────────────────────────────────────────────────────

    server {
        listen 127.0.0.1:8080;
        server_name localhost;
        access_log off;

        location /nginx_status {
            stub_status on;
            access_log off;
        }
    }
}
